<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Relay</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <h1>AI Relay</h1>
          <p>Capture and continue across AI providers.</p>
        </div>
        <span id="providerBadge" class="badge">Unknown</span>
      </header>

      <section class="panel">
        <button id="captureButton" class="primary" type="button">
          Capture current conversation
        </button>

        <div id="status" class="status" role="status" aria-live="polite">
          Ready.
        </div>

        <dl id="metadata" class="metadata" hidden>
          <div>
            <dt>Title</dt>
            <dd id="titleValue">—</dd>
          </div>
          <div>
            <dt>Messages</dt>
            <dd id="messageCountValue">0</dd>
          </div>
          <div>
            <dt>Checksum</dt>
            <dd id="checksumValue" class="checksum">—</dd>
          </div>
        </dl>

        <label for="preview">Handoff preview</label>
        <textarea
          id="preview"
          rows="16"
          readonly
          placeholder="Captured handoff will appear here."
        ></textarea>

        <div class="actions">
          <button id="copyMarkdownButton" type="button" disabled>
            Copy Markdown
          </button>
          <button id="copyJsonButton" type="button" disabled>
            Copy JSON
          </button>
        </div>

        <div class="actions">
          <button id="downloadMarkdownButton" type="button" disabled>
            Download Markdown
          </button>
          <button id="downloadJsonButton" type="button" disabled>
            Download JSON
          </button>
        </div>

        <button id="clearButton" class="secondary" type="button" disabled>
          Clear
        </button>
      </section>

      <footer>
        Local only. Nothing is sent automatically.
      </footer>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
