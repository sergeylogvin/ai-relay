<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Relay</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <h1>AI Relay</h1>
          <p>Capture and continue across AI providers.</p>
        </div>
        <span id="providerBadge" class="badge">Unknown</span>
      </header>

      <section class="panel">
        <button id="captureButton" class="primary" type="button">
          Capture current conversation
        </button>

        <div id="status" class="status" role="status" aria-live="polite">
          Ready.
        </div>

        <dl id="metadata" class="metadata" hidden>
          <div>
            <dt>Title</dt>
            <dd id="titleValue">—</dd>
          </div>
          <div>
            <dt>Messages</dt>
            <dd id="messageCountValue">0</dd>
          </div>
          <div>
            <dt>Est. tokens</dt>
            <dd id="tokenEstimateValue">—</dd>
          </div>
          <div>
            <dt>Handoff</dt>
            <dd id="handoffSizeValue">—</dd>
          </div>
          <div>
            <dt>Checksum</dt>
            <dd id="checksumValue" class="checksum">—</dd>
          </div>
        </dl>

        <label for="handoffMode">Handoff mode</label>
        <select id="handoffMode" disabled>
          <option value="full">Full transcript</option>
          <option value="recent">Recent messages</option>
          <option value="context-pack">Context pack</option>
        </select>

        <label for="preview">Handoff preview</label>
        <textarea
          id="preview"
          rows="16"
          readonly
          placeholder="Captured handoff will appear here."
        ></textarea>

        <button id="insertContextButton" class="primary" type="button" disabled>
          Insert handoff into current chat
        </button>

        <section class="continue-panel" aria-labelledby="continueHeading">
          <h2 id="continueHeading">Continue in another AI</h2>
          <p>Open a provider, insert this handoff, and review before sending.</p>
          <div class="continue-actions">
            <button
              id="continueChatgptButton"
              type="button"
              data-provider="chatgpt"
              disabled
            >
              Continue in ChatGPT
            </button>
            <button
              id="continueClaudeButton"
              type="button"
              data-provider="claude"
              disabled
            >
              Continue in Claude
            </button>
            <button
              id="continueGeminiButton"
              type="button"
              data-provider="gemini"
              disabled
            >
              Continue in Gemini
            </button>
          </div>
        </section>

        <div class="actions">
          <button id="copyMarkdownButton" type="button" disabled>
            Copy Markdown
          </button>
          <button id="copyJsonButton" type="button" disabled>
            Copy JSON
          </button>
        </div>

        <div class="actions">
          <button id="downloadMarkdownButton" type="button" disabled>
            Download Markdown
          </button>
          <button id="downloadJsonButton" type="button" disabled>
            Download JSON
          </button>
        </div>

        <button id="downloadZipButton" class="primary" type="button" disabled>
          Download ZIP package
        </button>

        <button id="saveLibraryButton" type="button" disabled>
          Save to Library
        </button>

        <button id="openLibraryButton" class="secondary" type="button">
          Open Library
        </button>

        <button id="clearButton" class="secondary" type="button" disabled>
          Clear
        </button>
      </section>

      <footer>
        Local only. Nothing is sent automatically.
      </footer>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
